name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      reason: ${{ steps.check.outputs.reason }}
      before_version: ${{ steps.check.outputs.before_version }}
      after_version: ${{ steps.check.outputs.after_version }}
      published_version: ${{ steps.check.outputs.published_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: package.json

      - name: Compare package versions
        id: check
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: npx --yes jiti scripts/check-release-version.ts

      - name: Print release decision
        run: |
          echo "should_publish=${{ steps.check.outputs.changed }}"
          echo "reason=${{ steps.check.outputs.reason }}"
          echo "before_version=${{ steps.check.outputs.before_version }}"
          echo "after_version=${{ steps.check.outputs.after_version }}"
          echo "published_version=${{ steps.check.outputs.published_version }}"

  publish-npm:
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build package
        run: pnpm build
      - name: Run tests
        run: pnpm test
      - name: Publish to npm
        run: pnpm publish --no-git-checks
